<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Employee System</title>
</head>

<body>
    <div th:switch="${employees}">
        <div class="row">
            <div>
                <h2 th:case="null"> Click link to add new employee </h2>
                <div th:case="*">
                    <h2>Employee</h2>
                    <table border="1">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Surname</th>
                                <th>Email</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="employee : ${employees}">
                                <td th:text="${employee.name}"></td>
                                <td th:text="${employee.surname}"></td>
                                <td th:text="${employee.email}"></td>
                                <td>
                                    <a th:href="@{/edit/{id}(id=${employee.id})}">EDIT</a>
                                </td>
                                <td>
                                    <a th:href="@{/delete/{id}(id=${employee.id})}">DELETE</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <p>
                    <a href="/new">Add Employee</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
